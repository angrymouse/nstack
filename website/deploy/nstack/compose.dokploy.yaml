# Generated by nstack. Ingress is managed by Dokploy Domains/Traefik.
name: "nstack"
services:
  frontend:
    image: "nstack-frontend:${NSTACK_IMAGE_TAG:-local}"
    pull_policy: "build"
    build:
      context: "${NSTACK_BUILD_CONTEXT:-../..}"
      dockerfile: "frontend/Dockerfile"
      platforms:
        - "linux/amd64"
    restart: "unless-stopped"
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3000"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      NUXT_PUBLIC_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_TARGET: "prod"
      NUXT_PUBLIC_NSTACK_DOMAIN: "nstack.playground.nik.technology"
      NUXT_PUBLIC_NSTACK_PROD_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_PROD_DOMAIN: "nstack.playground.nik.technology"
      NUXT_API_SERVER_BASE_URL: "http://nstack-backend:8080"
      NUXT_API_INTERNAL_BASE_URL: "http://nstack-backend:8080"
      NSTACK_TARGET: "prod"
      NSTACK_DOMAIN: "nstack.playground.nik.technology"
      NSTACK_API_BASE_URL: "http://nstack-backend:8080"
      NSTACK_PUBLIC_API_BASE_URL: "/api"
      NSTACK_APP_SLUG: "nstack"
      NSTACK_BACKEND_HOST: "nstack-backend"
      NSTACK_GIT_COMMIT: "${NSTACK_GIT_COMMIT:-local}"
      NSTACK_IMAGE_TAG: "${NSTACK_IMAGE_TAG:-local}"
    expose:
      - "3000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const net=require('node:net'); const socket=net.connect(3000, '127.0.0.1'); const done=(code)=>{socket.destroy();process.exit(code)}; socket.once('connect',()=>done(0)); socket.once('error',()=>done(1)); setTimeout(()=>done(1),1000)\""
      interval: "30s"
      timeout: "1s"
      retries: 3
      start_period: "30s"
      start_interval: "1s"
    depends_on:
      backend:
        condition: "service_started"
  backend:
    image: "nstack-backend:${NSTACK_IMAGE_TAG:-local}"
    pull_policy: "build"
    build:
      context: "${NSTACK_BUILD_CONTEXT:-../..}"
      dockerfile: "backend/Dockerfile"
      platforms:
        - "linux/amd64"
      args:
        ENCORE_INFRA_CONFIG_B64: "${ENCORE_INFRA_CONFIG_B64:?set ENCORE_INFRA_CONFIG_B64}"
    restart: "unless-stopped"
    environment:
      PORT: "8080"
      NODE_ENV: "production"
      APP_ID: "nstack"
      APP_VERSION: "${NSTACK_GIT_COMMIT:-local}"
      GIT_COMMIT: "${NSTACK_GIT_COMMIT:-local}"
      IMAGE_TAG: "${NSTACK_IMAGE_TAG:-local}"
      NSTACK_TARGET: "prod"
      NSTACK_DOMAIN: "nstack.playground.nik.technology"
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - "nstack-backend"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const timeout=AbortSignal.timeout(1000); fetch('http://127.0.0.1:8080/__encore/healthz', { signal: timeout }).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: "30s"
      timeout: "1s"
      retries: 3
      start_period: "30s"
      start_interval: "1s"
