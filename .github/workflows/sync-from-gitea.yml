name: Sync from Gitea

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-from-gitea
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Gitea refs into GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEA_REPOSITORY: https://git.nik.technology/angrymouse/nstack.git
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          git init --bare "$workdir/repo.git"
          cd "$workdir/repo.git"

          git remote add gitea "$GITEA_REPOSITORY"
          git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch --prune gitea '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
          git -c credential.helper= push --prune github '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
